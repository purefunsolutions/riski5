#
# Config file for YosysHQ/riscv-formal's genchecks.py.
# Mirrors cores/nerv/checks.cfg with scope trimmed to what
# riski5 phase-1 actually implements (RV32I, M-mode, Zicsr,
# Zifencei; no M-extension, no compressed, no supervisor).
#
# Starts with a minimal "just one insn_add check" proof so we
# can verify the riski5_formal → wrapper.sv → sby → solver
# pipeline end-to-end before expanding. Once insn_add goes
# green, uncomment the wider per-check depths below.

[options]
isa rv32i
nret 1

[depth]
insn      20
pc_fwd    5 20
pc_bwd    5 20
reg       5 20
causal    5 20
ill         20
# `unique` and `liveness` want three-value depth configs
# (start / trig / depth) and burn significantly more solver
# cycles than the bounded checks above. Keep disabled until
# the budget allows; the k-induction on `liveness` in
# particular requires a stronger invariant set than the rest.

[defines]
`define RISCV_FORMAL
`define RISCV_FORMAL_NRET 1
`define RISCV_FORMAL_XLEN 32
`define RISCV_FORMAL_ILEN 32
`define RISCV_FORMAL_ALIGNED_MEM

[verilog-files]
@basedir@/cores/@core@/wrapper.sv
@basedir@/cores/@core@/riski5_formal.v

[cover]
# no cover checks yet — the per-insn proofs cover reachability
# implicitly; every check_insn_*_ch0 cover step asserts that the
# instruction is reachable at all.
