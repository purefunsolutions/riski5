#
# Config file for YosysHQ/riscv-formal's genchecks.py.
# Mirrors cores/nerv/checks.cfg with scope trimmed to what
# riski5 phase-1/2 actually implements (RV32I + RV32M, M-mode,
# Zicsr, Zifencei; no compressed, no supervisor).
#
# Current coverage under `nix build .#riski5-formal` (all PASS):
#   - 37 RV32I per-instruction proofs (insn_*_ch0) — the whole
#     integer + control + load/store set.
#   - 8 RV32M per-instruction proofs (insn_{mul,mulh,mulhsu,mulhu,
#     div,divu,rem,remu}_ch0) — lit up by `isa rv32im` below.
#     The Clash-emitted Verilog uses the combinational MulDiv
#     variant (see pkgs/riski5-formal/package.nix §1, built with
#     `-cpp -DFORMAL_FAST_MULDIV`) so the proof sees a 1-cycle
#     retire rather than the 34-cycle iterative FSM, which keeps
#     the depth-10 BMC formula tractable for boolector. The
#     iterative variant that ships to real silicon is validated
#     end-to-end by the triple-diff harness in
#     test/CoreSimSpec.hs + test/SpikeDiffSpec.hs (Spike ↔
#     Reference ↔ Core on 10 concrete programs covering
#     positive/negative/signed-overflow/divide-by-zero edges).
#   - pc_fwd, pc_bwd, reg, causal, ill — structural proofs over
#     sequential retires.
#   - csrw_<csr>_ch0 for each of the six M-mode CSRs the core
#     implements (mstatus, mtvec, mepc, mcause, mtval, mscratch).
#   - csrc_any_<csr>_ch0 for the three purely CSR-mutated ones
#     (mstatus, mtvec, mscratch). The three trap-written CSRs
#     (mepc, mcause, mtval) are out of scope for csrc_any — see
#     the [csrs] section below for why.
#   - unique — proves rvfi_order values never repeat; our
#     `register 0 (if valid then o+1 else o)` counter satisfies
#     this trivially and boolector closes it in a few seconds.
#   - liveness — proves that after every retire, the next
#     retire happens within the bounded window. No fairness
#     assumption needed: `Riski5.Core.effectiveImemS` injects
#     a NOP into decode whenever `squashNext` is True, so any
#     branch / jump / trap squashes for *exactly* one cycle.
#     An adversarial imem stream of JAL-to-self can't keep
#     `squashNext` True past the next cycle because the
#     squashed cycle's decoder sees a NOP regardless of what
#     the harness drives on `imem_rdata`. Boolector closes
#     `liveness_ch0` in five seconds at depth 10.
#
# Every `riscv-formal` proof family in scope for our ISA
# (RV32I + Zicsr + M-mode, no compressed, no supervisor) is
# now green.

[options]
isa rv32im
nret 1

[depth]
# Depth matches YosysHQ nerv across the board. The two bugs the
# harness originally caught on our core (byte-addressed
# rvfi_mem_addr, missing InstrAddrMisaligned trap on fall-
# through branches) both surfaced in ≤5-cycle counter-examples,
# so depth 10 loses nothing we've exercised.
#
# All insn_* proofs (including the eight RV32M ones) close at
# depth 10 because the Clash-emitted Verilog uses the
# 'mulDivFUCombinational' variant of the MulDiv FU under the
# `FORMAL_FAST_MULDIV` CPP flag — see
# pkgs/riski5-formal/package.nix for the switch and
# src/Riski5/Core/FU/MulDiv.hs for the soundness argument
# (the iterative variant is separately validated end-to-end
# by the triple-diff harness in test/CoreSimSpec.hs).
insn      10
pc_fwd    5 10
pc_bwd    5 10
reg       5 10
causal    5 10
ill         10
csrw         10
csrc_any  1  5
unique    1  5 10
liveness  1  5 10
# The `csrc_any_*` checks run under z3 instead of the default
# boolector — see the sed post-processing step in
# pkgs/riski5-formal/package.nix. Boolector's bit-blaster
# stalls on the quantifier-heavy CSR-consistency invariants;
# z3 closes them in seconds. Everything else (including `reg`)
# stays on boolector. `reg`'s depth is pulled down to 10
# (matches nerv's config); depth 20 cost too much for marginal
# coverage gain over a depth-10 k-induction.

[csrs]
# Zicsr + M-mode CSRs 'Riski5.CSR' actually implements. Each entry
# yields a csrw_<name>_ch0 (per-CSR-instruction contract) check
# for every retire. The `any` test marker *additionally* generates
# a csrc_any_<name>_ch0 (consistency across retires) check — the
# general "whatever gets written reads back next time" check — for
# CSRs whose value is only mutated by CSR instructions.
#
# The three trap-written CSRs (`mcause`, `mepc`, `mtval`) are
# listed *without* the `any` marker: our core updates them on any
# trap retire via the `applyTrap` path, and `rvfi_csrc_any_check.sv`
# maintains a shadow that only advances on CSR-instruction retires,
# so the cross-retire consistency check falsely fires every time a
# trap changes the CSR behind its back. `csrw_*` alone on those
# three still pins the per-instruction contract, which is the
# interesting property — consistency across traps is covered by
# `pc_fwd`/`pc_bwd` + `causal` for the architectural flow.
#
# A CSR listed without a test type generates a nameless `csrc_<csr>`
# check that looks for the non-existent `rvfi_csrc_check.sv`; that
# check is auto-skipped because we declare no `csrc` depth in the
# [depth] section, so those CSRs cleanly get only `csrw_*`.
#
# Order here must match the [defines] section below.
mstatus any
mtvec any
mscratch any
mepc
mcause
mtval

[defines]
`define RISCV_FORMAL
`define RISCV_FORMAL_NRET 1
`define RISCV_FORMAL_XLEN 32
`define RISCV_FORMAL_ILEN 32
`define RISCV_FORMAL_ALIGNED_MEM
`define RISCV_FORMAL_CSR_MSTATUS
`define RISCV_FORMAL_CSR_MTVEC
`define RISCV_FORMAL_CSR_MEPC
`define RISCV_FORMAL_CSR_MCAUSE
`define RISCV_FORMAL_CSR_MTVAL
`define RISCV_FORMAL_CSR_MSCRATCH
// RISCV_FORMAL_ALTOPS swaps the spec's MUL/DIV/REM checks from real
// arithmetic to `(rs1 +/- rs2) ^ bitmask` stubs, which our core
// matches bit-for-bit under FORMAL_FAST_MULDIV. This keeps the
// per-insn SMT formula small — no multiplier or divider primitive
// for the solver to bit-blast. The iterative FU that ships to
// silicon is separately validated via the triple-diff harness
// (test/SpikeDiffSpec.hs vs Spike --isa=rv32im).
`define RISCV_FORMAL_ALTOPS

[verilog-files]
@basedir@/cores/@core@/wrapper.sv
@basedir@/cores/@core@/riski5_formal.v

[cover]
# no cover checks yet — the per-insn proofs cover reachability
# implicitly; every check_insn_*_ch0 cover step asserts that the
# instruction is reachable at all.
